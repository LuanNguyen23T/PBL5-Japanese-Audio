# ============================================================
# GPU Override Compose File
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# Requires: NVIDIA GPU + NVIDIA Container Toolkit on host
# ============================================================

services:
  sbvits2:
    environment:
      - DEVICE=cuda

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
